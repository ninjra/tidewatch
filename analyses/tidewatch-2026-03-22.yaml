  key_files:
    CLAUDE.md: "# CLAUDE.md -- Tidewatch\n\n## What This Repo Is\n\nTidewatch is a pure-math scoring engine for obligation\
      \ pressure with cognitive\nbandwidth adaptation and a benchmark analytics harness. Core capabilities:\n\n- **Pressure\
      \ scoring**: continuous scores (0.0-1.0) from deadline proximity,\n  materiality, dependencies, and completion progress\n\
      - **Cognitive bandwidth modulation** (CognitiveContext): re-ranks the pressure-sorted\n  queue based on operator physiological\
      \ state (sleep, pain, HRV) — integral to the\n  scoring engine, not an add-on\n- **Speculative planning** (SpeculativePlanner):\
      \ uses idle compute to pre-generate\n  action plans for high-pressure obligations — extends the scoring engine's output\n\
      \  into actionable plan requests\n- **Triage** (TriageQueue): stages candidate obligations from external scanners\n\
      \  for operator review with deduplication\n\nAn accompanying SSRN paper formalizes the exponential decay pressure model.\n\
      \n## Build Commands\n\n```bash\npip install -e \".[dev]\"\npytest tests/ -v\npython -m benchmarks.run --suite all\n\
      ```\n\n## Code Standards\n\n- Python 3.11+, type hints on all public functions\n- Pure math in core -- no database,\
      \ no LLM, no async in the pressure engine\n- Speculative planner returns prompt templates -- caller provides the LLM\n\
      - Zero runtime dependencies. stdlib math only.\n\n## Key Equations\n\nP = min(1.0, P_time * M * A * D)\n\n- P_time(t)\
      \ = 1 - exp(-3 / max(t, 0.01)) for t > 0; 1.0 for t <= 0\n- M = 1.5 (material) or 1.0 (routine)\n- A = 1.0 + (dependency_count\
      \ * 0.1)\n- D = 1.0 - (completion_pct * 0.6)\n\nZones: green < 0.30, yellow < 0.60, orange < 0.80, red >= 0.80\n\n##\
      \ Testing\n\nRun before every commit: `python -m pytest tests/ -v`\n\n## Sentinel Integration\n\nThis repo is part of\
      \ the Sentinel ecosystem. Use `sentinel_query.py` for all cross-repo\ncoordination. The tool lives at `~/projects/Sentinel/scripts/sentinel_query.py`.\n\
      \n**Note:** Sentinel integration is a development workflow dependency, NOT a runtime\ndependency. The tidewatch library\
      \ (`tidewatch/`) has zero external dependencies and\nfunctions fully without Sentinel. The sentinel_sdk telemetry integration\
      \ is an optional\nextra (`pip install -e \".[telemetry]\"`) that degrades gracefully if unavailable.\n\n### Session\
      \ Lifecycle\n\nAt the start of every Claude Code session in this repo:\n```bash\npython3 ~/projects/Sentinel/scripts/sentinel_query.py\
      \ session-start tidewatch \"<brief task description>\"\n```\n\nAt the end of every session:\n```bash\npython3 ~/projects/Sentinel/scripts/sentinel_query.py\
      \ session-complete \"<summary>\"\n```\n\n### Check Obligations\n\nBefore starting work, check what's owed:\n```bash\n\
      python3 ~/projects/Sentinel/scripts/sentinel_query.py obligations --repo tidewatch\n```\n\n### Cross-Repo Awareness\n\
      \nSee what other Claude sessions are doing right now:\n```bash\npython3 ~/projects/Sentinel/scripts/sentinel_query.py\
      \ sessions\n```\n\n### Memory\n\nRead/write persistent memories that survive across sessions:\n```bash\npython3 ~/projects/Sentinel/scripts/sentinel_query.py\
      \ memory-read \"<name>\"\npython3 ~/projects/Sentinel/scripts/sentinel_query.py memory-save \"<name>\" \"<type>\" \"\
      <description>\" \"<content>\"\npython3 ~/projects/Sentinel/scripts/sentinel_query.py memory --search \"<search term>\"\
      \n```\n\n### Important\n\n- **Do NOT use session_log.py** — it is deprecated. sentinel_query.py is the replacement.\n\
      - **Do NOT write to flat .md/.json memory files** — all memory goes to MSSQL via sentinel_query.py.\n- **Do NOT skip\
      \ session-start/session-complete** — obligation tracking and cross-repo awareness depend on it.\n"
    README.md: "# Tidewatch\n\n**Multi-objective task prioritization with deferred scalarization.**\n\nTidewatch decomposes\
      \ urgency into six multiplicative factors (all bounded\naway from zero) and retains them in a six-dimensional component\
      \ space with\ndeferred scalarization — preserving per-factor interpretability until\nranking time.\n\n## Install\n\n\
      ```bash\npip install -e \".[dev]\"\n```\n\n## Quick Start\n\n```python\nfrom datetime import datetime, timezone, timedelta\n\
      from tidewatch import (\n    Obligation, calculate_pressure, recalculate_batch,\n    CognitiveContext, bandwidth_adjusted_sort,\n\
      )\n\n# Create obligations\nnow = datetime.now(timezone.utc)\nobligations = [\n    Obligation(\n        id=1, title=\"\
      File Q1 taxes\",\n        due_date=now + timedelta(days=3),\n        materiality=\"material\", dependency_count=2,\n\
      \        completion_pct=0.1,\n    ),\n    Obligation(\n        id=2, title=\"Update project README\",\n        due_date=now\
      \ + timedelta(days=14),\n        materiality=\"routine\", dependency_count=0,\n        completion_pct=0.0,\n    ),\n\
      ]\n\n# Calculate pressure (product of all six components)\nresults = recalculate_batch(obligations)\nfor r in results:\n\
      \    print(f\"{r.obligation_id}: P={r.pressure:.3f} [{r.zone}]\")\n    # Access individual factors via component space\n\
      \    if r.component_space:\n        cs = r.component_space.space.components\n        print(f\"  time={cs['time_pressure']:.3f}\
      \ mat={cs['materiality']:.1f} \"\n              f\"dep={cs['dependency_amp']:.3f} comp={cs['completion_damp']:.3f}\"\
      )\n\n# Bandwidth-aware reranking (specified, not empirically validated)\nctx = CognitiveContext(sleep_quality=0.4, pain_level=0.3)\n\
      reranked = bandwidth_adjusted_sort(results, obligations, ctx)\nfor r in reranked:\n    print(f\"{r.obligation_id}: P={r.pressure:.3f}\
      \ (reranked)\")\n```\n\n## Six Factors\n\n| Category | Factor | Role |\n|----------|--------|------|\n| Temporal | Exponential\
      \ time-decay | Base urgency signal |\n| Temporal | Timing-sensitivity amplification | Escalation for stagnant tasks\
      \ |\n| Temporal | Deadline-violation amplification | Decaying penalty for past misses |\n| State | Materiality weighting\
      \ | Impact classification |\n| State | Logistic completion dampening | Urgency reduces as completion → 100% |\n| Structural\
      \ | Temporally gated dependency fanout | Amplification from downstream blockers |\n\nAll factors are bounded away from\
      \ zero. The product cannot collapse from\na single factor.\n\n## Pressure Curve\n\nThe exponential time-decay with k=3.0\
      \ produces:\n- 14 days out: P ≈ 0.19 (green)\n- 7 days out: P ≈ 0.35 (yellow)\n- 3 days out: P ≈ 0.63 (orange)\n- 1\
      \ day out: P ≈ 0.95 (red)\n\n## EDF Comparison\n\nEDF is theoretically optimal for deadline minimization. Tidewatch\
      \ does\nnot compete on that metric. At N=200, EDF achieves 18.5% missed deadlines\nvs. Tidewatch's 20.1% — an 8.6% relative\
      \ cost of encoding materiality,\ndependency fanout, and completion state alongside deadline proximity.\n\nThe contribution\
      \ is interpretable, auditable multi-factor ranking with\ndeferred scalarization, not deadline optimality.\n\n## Tests\n\
      \n```bash\npytest tests/ -q            # 563 tests\nruff check .                # lint\n```\n\nGolden values verified\
      \ to Δ < 10⁻¹⁰ against analytically computed\nreference values under pinned Python 3.11+ with zero runtime dependencies.\n\
      \n## Paper\n\n> **Tidewatch: Continuous Obligation Pressure with Cognitive Bandwidth Adaptation**\n> S. N. Justin Ram,\
      \ Infoil LLC (2026)\n> [SSRN link pending]\n\n## License\n\nApache-2.0 OR Commercial\n"
