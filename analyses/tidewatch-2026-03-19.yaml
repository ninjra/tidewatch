  key_files:
    CLAUDE.md: '# CLAUDE.md -- Tidewatch


      ## What This Repo Is


      Tidewatch is a standalone Python library + SSRN paper that extracts and

      formalizes the obligation pressure engine and speculative planning system

      from Sentinel. It models deadline urgency as a continuous pressure field

      rather than a binary overdue/not-overdue flag, and uses idle compute cycles

      to proactively generate action plans for high-pressure obligations.


      ## Build Commands


      ```bash

      pip install -e ".[dev]"

      pytest tests/ -v

      python -m benchmarks.run --suite all

      ```


      ## Code Standards


      - Python 3.11+, type hints on all public functions

      - Pure math in core -- no database, no LLM, no async in the pressure engine

      - Speculative planner returns prompt templates -- caller provides the LLM

      - Zero runtime dependencies. stdlib math only.


      ## Key Equations


      P = min(1.0, P_time * M * A * D)


      - P_time(t) = 1 - exp(-3 / max(t, 0.01)) for t > 0; 1.0 for t <= 0

      - M = 1.5 (material) or 1.0 (routine)

      - A = 1.0 + (dependency_count * 0.1)

      - D = 1.0 - (completion_pct * 0.6)


      Zones: green < 0.30, yellow < 0.60, orange < 0.80, red >= 0.80


      ## Testing


      Run before every commit: `python -m pytest tests/ -v`


      ## Sentinel Integration


      This repo is part of the Sentinel ecosystem. Use `sentinel_query.py` for all cross-repo

      coordination. The tool lives at `~/projects/Sentinel/scripts/sentinel_query.py`.


      ### Session Lifecycle


      At the start of every Claude Code session in this repo:

      ```bash

      python3 ~/projects/Sentinel/scripts/sentinel_query.py session-start tidewatch "<brief task description>"

      ```


      At the end of every session:

      ```bash

      python3 ~/projects/Sentinel/scripts/sentinel_query.py session-complete "<summary>"

      ```


      ### Check Obligations


      Before starting work, check what''s owed:

      ```bash

      python3 ~/projects/Sentinel/scripts/sentinel_query.py obligations --repo tidewatch

      ```


      ### Cross-Repo Awareness


      See what other Claude sessions are doing right now:

      ```bash

      python3 ~/projects/Sentinel/scripts/sentinel_query.py sessions

      ```


      ### Memory


      Read/write persistent memories that survive across sessions:

      ```bash

      python3 ~/projects/Sentinel/scripts/sentinel_query.py memory-read "<name>"

      python3 ~/projects/Sentinel/scripts/sentinel_query.py memory-save "<name>" "<type>" "<description>" "<content>"

      python3 ~/projects/Sentinel/scripts/sentinel_query.py memory --search "<search term>"

      ```


      ### Important


      - **Do NOT use session_log.py** — it is deprecated. sentinel_query.py is the replacement.

      - **Do NOT write to flat .md/.json memory files** — all memory goes to MSSQL via sentinel_query.py.

      - **Do NOT skip session-start/session-complete** — obligation tracking and cross-repo awareness depend on it.

      '
    README.md: "# Tidewatch\n\n**Continuous obligation pressure with proactive idle-time planning.**\n\nTidewatch models deadline\
      \ urgency as a hydraulic pressure field.\nObligations build pressure exponentially as deadlines approach.\nMaterial\
      \ obligations carry more. Dependencies amplify. Progress\ndampens. The system plans before you ask.\n\n## Install\n\n\
      ```bash\npip install tidewatch\n```\n\n## Quick Start\n\n```python\nfrom datetime import datetime, timezone, timedelta\n\
      from tidewatch import (\n    Obligation, calculate_pressure, pressure_zone,\n    SpeculativePlanner, recalculate_batch,\n\
      )\n\n# Create obligations\nobligations = [\n    Obligation(\n        id=1, title=\"File Q1 taxes\",\n        due_date=datetime.now(timezone.utc)\
      \ + timedelta(days=3),\n        materiality=\"material\", dependency_count=2,\n        completion_pct=0.1,\n    ),\n\
      \    Obligation(\n        id=2, title=\"Update project README\",\n        due_date=datetime.now(timezone.utc) + timedelta(days=14),\n\
      \        materiality=\"routine\", dependency_count=0,\n        completion_pct=0.0,\n    ),\n]\n\n# Calculate pressure\n\
      results = recalculate_batch(obligations)\nfor r in results:\n    print(f\"{r.obligation_id}: P={r.pressure:.2f} [{r.zone}]\"\
      )\n\n# Generate speculative plans for high-pressure items\nplanner = SpeculativePlanner()\nplan_requests = planner.generate_plan_requests(results,\
      \ obligations=obligations)\nfor req in plan_requests:\n    print(f\"Plan needed: {req.obligation.title}\")\n    print(f\"\
      Prompt: {req.prompt[:100]}...\")\n    # Send req.prompt to your LLM, then:\n    # result = planner.complete_plan(req,\
      \ llm_output)\n```\n\n## Paper\n\n> **Tidewatch: Continuous Obligation Pressure with Proactive Idle-Time\n> Planning\
      \ for Intelligent Task Management**\n> Justin Ram, Infoil LLC (2026)\n> [SSRN link pending]\n\n## License\n\nMIT\n"
    pyproject.toml: "[build-system]\nrequires = [\"setuptools>=68.0\", \"wheel\"]\nbuild-backend = \"setuptools.build_meta\"\
      \n\n[project]\nname = \"tidewatch\"\nversion = \"0.1.0\"\ndescription = \"Continuous obligation pressure with proactive\
      \ idle-time planning\"\nreadme = \"README.md\"\nlicense = \"Apache-2.0 OR LicenseRef-Commercial\"\nrequires-python =\
      \ \">=3.11\"\nauthors = [\n    {name = \"Justin Ram\", email = \"justin.ram@gmail.com\"},\n]\nkeywords = [\n    \"task\
      \ management\", \"deadline\", \"urgency\", \"pressure\",\n    \"proactive planning\", \"AI agents\", \"obligation tracking\"\
      ,\n]\ndependencies = []\n\n[project.optional-dependencies]\ndev = [\n    \"pytest>=7.0\",\n    \"pytest-cov\",\n   \
      \ \"ruff\",\n    \"mypy\",\n]\nbenchmarks = [\n    \"matplotlib>=3.7\",\n    \"pandas>=2.0\",\n    \"numpy>=1.24\",\n\
      ]\ntelemetry = [\n    \"sentinel-sdk\",\n]\n\n[tool.setuptools.packages.find]\ninclude = [\"tidewatch*\"]\n\n[tool.pytest.ini_options]\n\
      testpaths = [\"tests\"]\n\n[tool.ruff]\ntarget-version = \"py312\"\nline-length = 120\n\n[tool.ruff.lint]\nselect =\
      \ [\"E\", \"F\", \"W\", \"I\", \"UP\", \"B\", \"SIM\"]\nignore = [\"E501\"]\n"
